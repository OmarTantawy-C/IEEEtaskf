<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Click the button for a Surprise.</p>

    <button onclick="Surprise()">Click Me</button>

    <script>
        function Surprise() {
            document.body.innerHTML = ("<h1>Surprise.🎉🎉</h1>")
        }
    </script>
    
</body>
</html>
